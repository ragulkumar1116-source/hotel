<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0">
  <title>Hotel Management — Login</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
  <link href="css/style.css" rel="stylesheet">
</head>
<body>

<div class="login-pg">
  <div class="login-card">
    <div class="login-logo">
      <div class="logo-icon">🏨</div>
      <h1 id="hname">Hotel</h1>
      <p>Management System</p>
    </div>

    <div id="lalert"></div>

    <div class="fg">
      <label class="fl">Email Address</label>
      <input type="email" id="lemail" class="fc" placeholder="admin@hotel.com">
    </div>

    <div class="fg">
      <label class="fl">Password</label>
      <input type="password" id="lpass" class="fc" placeholder="••••••••"
             onkeydown="if(event.key==='Enter')login()">
    </div>

    <button onclick="login()" class="btn btn-p" id="lbtn"
            style="width:100%; display:flex; justify-content:center; align-items:center; padding:12px; margin-top:6px">
      <i class="bi bi-box-arrow-in-right me-2"></i> <span>Sign In</span>
    </button>

    <p style="text-align:center; margin-top:18px; font-size:.75rem; color:gray">
      Secure access — authorised staff only
    </p>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="js/config.js"></script>

<script>
  // Global variable for Firebase Auth
  let auth;

  // 1. Initialize System safely
  (function init() {
    try {
      // Check if config.js loaded correctly
      if (typeof firebaseConfig !== 'undefined') {
        firebase.initializeApp(firebaseConfig);
        auth = firebase.auth();
        console.log("Firebase initialized.");

        // Apply branding from HOTEL object
        if (typeof HOTEL !== 'undefined') {
          document.getElementById('hname').textContent = HOTEL.name;
          document.title = HOTEL.name + ' — Login';
        }

        // Auto-redirect if already logged in
        auth.onAuthStateChanged(user => {
          if (user) window.location.href = 'app.html';
        });

      } else {
        showAlert("Config Error: check js/config.js file.");
      }
    } catch (e) {
      console.error("Initialization Failed:", e);
      showAlert("System Error: Check console logs.");
    }
  })();

  // 2. Sign In Function
  function login() {
    const email = document.getElementById('lemail').value.trim();
    const pass = document.getElementById('lpass').value;
    const btn = document.getElementById('lbtn');
    const alertBox = document.getElementById('lalert');

    // Prevent errors if Firebase didn't load
    if (!auth) {
      showAlert("Firebase Connection Failed.");
      return;
    }

    if (!email || !pass) {
      showAlert("Please enter email and password.");
      return;
    }

    // UI Loading State
    btn.disabled = true;
    btn.querySelector('span').textContent = 'Signing in...';
    alertBox.innerHTML = ''; 

    auth.signInWithEmailAndPassword(email, pass)
      .then(() => {
        window.location.href = 'app.html';
      })
      .catch((error) => {
        console.error("Auth Error:", error.code);
        btn.disabled = false;
        btn.querySelector('span').textContent = 'Sign In';

        let friendlyMsg = "Invalid login credentials.";
        if (error.code === 'auth/network-request-failed') friendlyMsg = "Network error. Check connection.";
        
        showAlert(friendlyMsg);
      });
  }

  // 3. Alert Helper
  function showAlert(msg) {
    document.getElementById('lalert').innerHTML = `
      <div style="padding:10px; border-radius:8px; background:rgba(225,29,72,0.1); color:#fb7185; border:1px solid rgba(225,29,72,0.2); margin-bottom:15px; font-size:0.85rem;">
        <i class="bi bi-exclamation-triangle-fill me-2"></i> ${msg}
      </div>`;
  }
</script>

</body>
</html>
