<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0">
  <title>Hotel Management — Login</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
  <link href="css/style.css" rel="stylesheet">
</head>
<body>
<div class="login-pg">
  <div class="login-card">
    <div class="login-logo">
      <div class="logo-icon">🏨</div>
      <h1 id="hname">Hotel</h1>
      <p>Management System</p>
    </div>
    <div id="lalert"></div>
    <div class="fg">
      <label class="fl">Email Address</label>
      <input type="email" id="lemail" class="fc" placeholder="admin@hotel.com">
    </div>
    <div class="fg">
      <label class="fl">Password</label>
      <input type="password" id="lpass" class="fc" placeholder="••••••••"
             onkeydown="if(event.key==='Enter')login()">
    </div>
    <button onclick="login()" class="btn btn-p" id="lbtn"
            style="width:100%;justify-content:center;padding:12px;margin-top:6px;display:flex;align-items:center;">
      <i class="bi bi-box-arrow-in-right me-2"></i> <span>Sign In</span>
    </button>
    <p style="text-align:center;margin-top:18px;font-size:.75rem;color:gray">
      Secure access — authorised staff only
    </p>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="js/config.js"></script>

<script>
  let auth;

  // 1. Initialize only if config loaded
  if (typeof firebaseConfig !== 'undefined') {
    firebase.initializeApp(firebaseConfig);
    auth = firebase.auth();
    
    if (typeof HOTEL !== 'undefined') {
      document.getElementById('hname').textContent = HOTEL.name;
      document.title = HOTEL.name + ' — Login';
    }

    auth.onAuthStateChanged(u => { if (u) location.href = 'app.html'; });
  } else {
    console.error("Config failed to load.");
    showLocalAlert("Configuration error: Check config.js");
  }

  // 2. Login Logic
  function login() {
    const e = document.getElementById('lemail').value.trim();
    const p = document.getElementById('lpass').value;
    const btn = document.getElementById('lbtn');

    if (!auth) {
      showLocalAlert("Firebase is not initialized.");
      return;
    }

    if (!e || !p) { showLocalAlert("Enter email and password."); return; }

    btn.disabled = true;
    btn.querySelector('span').textContent = 'Signing in...';

    auth.signInWithEmailAndPassword(e, p)
      .then(() => location.href = 'app.html')
      .catch((error) => {
        console.error(error.code);
        showLocalAlert("Invalid credentials or network error.");
        btn.disabled = false;
        btn.querySelector('span').textContent = 'Sign In';
      });
  }

  function showLocalAlert(msg) {
    document.getElementById('lalert').innerHTML =
      `<div style="padding:10px; border-radius:8px; background:rgba(225,29,72,.1); color:#fb7185; border:1px solid rgba(225,29,72,.2); margin-bottom:15px; font-size:.85rem;">
        <i class="bi bi-exclamation-circle me-1"></i>${msg}
      </div>`;
  }
</script>
</body>
</html>
