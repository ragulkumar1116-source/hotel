<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0">
  <title>Grandeur — Hotel Management</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
  <link href="css/style.css" rel="stylesheet">
</head>
<body>

<div class="login-page" id="loginPage">
  <div class="login-card">
    <div class="login-logo">
      <div class="logo-icon">🏨</div>
      <h1 id="hotelNameLogin">Grandeur</h1>
      <p>Hotel Management System</p>
    </div>
    <div id="loginAlert"></div>
    <div class="form-group">
      <label class="form-label">Email Address</label>
      <input type="email" id="loginEmail" class="form-control" placeholder="admin@hotel.com">
    </div>
    <div class="form-group">
      <label class="form-label">Password</label>
      <input type="password" id="loginPassword" class="form-control" placeholder="••••••••"
             onkeydown="if(event.key==='Enter')doLogin()">
    </div>
    <button onclick="doLogin()" class="btn btn-primary" style="width:100%;justify-content:center;padding:12px;margin-top:8px" id="loginBtn">
      <i class="bi bi-box-arrow-in-right"></i> Sign In
    </button>
    <p style="text-align:center;margin-top:20px;font-size:0.78rem;color:var(--muted)">
      Secure access for hotel staff only
    </p>
  </div>
</div>

<!-- Firebase SDKs -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="js/config.js"></script>
<script>
  firebase.initializeApp(firebaseConfig);
  const auth = firebase.auth();

  document.getElementById('hotelNameLogin').textContent = HOTEL_CONFIG.name;
  document.title = HOTEL_CONFIG.name + ' — Hotel Management';

  auth.onAuthStateChanged(user => {
    if (user) window.location.href = 'app.html';
  });

  function doLogin() {
    const email = document.getElementById('loginEmail').value.trim();
    const pass  = document.getElementById('loginPassword').value;
    const btn   = document.getElementById('loginBtn');
    const alert = document.getElementById('loginAlert');
    alert.innerHTML = '';
    if (!email || !pass) {
      showAlert('Please enter email and password.', 'danger'); return;
    }
    btn.disabled = true;
    btn.innerHTML = '<span class="spinner"></span> Signing in...';
    auth.signInWithEmailAndPassword(email, pass)
      .then(() => window.location.href = 'app.html')
      .catch(err => {
        showAlert('Invalid credentials. Please try again.', 'danger');
        btn.disabled = false;
        btn.innerHTML = '<i class="bi bi-box-arrow-in-right"></i> Sign In';
      });
  }

  function showAlert(msg, type) {
    document.getElementById('loginAlert').innerHTML =
      `<div class="alert alert-${type}"><i class="bi bi-exclamation-circle"></i> ${msg}</div>`;
  }
</script>

</body>
</html>
