<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="js/config.js"></script>

<script>
  let auth; // Declare auth globally so login() can see it

  try {
    // Check if config.js successfully loaded the variable
    if (typeof firebaseConfig !== 'undefined') {
      firebase.initializeApp(firebaseConfig);
      auth = firebase.auth();
      
      // Update UI with Hotel Name
      if (typeof HOTEL !== 'undefined') {
        document.getElementById('hname').textContent = HOTEL.name;
        document.title = HOTEL.name + ' — Login';
      }

      // Check for existing login session
      auth.onAuthStateChanged(u => { if (u) location.href = 'app.html'; });
    } else {
      throw new Error("firebaseConfig is missing. Check config.js for syntax errors.");
    }
  } catch (e) {
    console.error("System Init Failed:", e.message);
  }

  function login() {
    // Guard clause: if auth isn't ready, don't try to log in
    if (!auth) {
      showAlert("System Error: Firebase not connected. Check config.js", "err");
      return;
    }

    const e = document.getElementById('lemail').value.trim();
    const p = document.getElementById('lpass').value;
    const btn = document.getElementById('lbtn');

    if (!e || !p) { showAlert('Enter email and password.', 'err'); return; }
    
    btn.disabled = true;
    btn.innerHTML = 'Signing in…';

    auth.signInWithEmailAndPassword(e, p)
      .then(() => location.href = 'app.html')
      .catch((error) => {
        showAlert('Invalid credentials. Please try again.', 'err');
        btn.disabled = false;
        btn.innerHTML = '<i class="bi bi-box-arrow-in-right"></i> Sign In';
      });
  }

  function showAlert(msg) {
    document.getElementById('lalert').innerHTML =
      `<div style="padding:10px 14px;border-radius:9px;margin-bottom:14px;font-size:.84rem;
        background:rgba(225,29,72,.12);border:1px solid rgba(225,29,72,.25);color:#fb7185">
        <i class="bi bi-exclamation-circle me-1"></i>${msg}</div>`;
  }
</script>
