<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0">
  <title>Hotel Management — Login</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
  <link href="css/style.css" rel="stylesheet">
</head>
<body>
<div class="login-pg">
  <div class="login-card">
    <div class="login-logo">
      <div class="logo-icon">🏨</div>
      <h1 id="hname">Hotel</h1>
      <p>Management System</p>
    </div>
    <div id="lalert"></div>
    <div class="fg">
      <label class="fl">Email Address</label>
      <input type="email" id="lemail" class="fc" placeholder="admin@hotel.com">
    </div>
    <div class="fg">
      <label class="fl">Password</label>
      <input type="password" id="lpass" class="fc" placeholder="••••••••"
             onkeydown="if(event.key==='Enter')login()">
    </div>
    <button onclick="login()" class="btn btn-p" id="lbtn"
            style="width:100%;justify-content:center;padding:12px;margin-top:6px">
      <i class="bi bi-box-arrow-in-right"></i> Sign In
    </button>
    <p style="text-align:center;margin-top:18px;font-size:.75rem;color:var(--muted)">
      Secure access — authorised staff only
    </p>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="js/config.js"></script>
<script>
  firebase.initializeApp(firebaseConfig);
  const auth = firebase.auth();
  document.getElementById('hname').textContent = HOTEL.name;
  document.title = HOTEL.name + ' — Login';

  auth.onAuthStateChanged(u => { if (u) location.href = 'app.html'; });

  function login() {
    const e = document.getElementById('lemail').value.trim();
    const p = document.getElementById('lpass').value;
    if (!e || !p) { alert('Enter email and password.', 'err'); return; }
    const btn = document.getElementById('lbtn');
    btn.disabled = true;
    btn.innerHTML = '<span class="spin"></span> Signing in…';
    auth.signInWithEmailAndPassword(e, p)
      .then(() => location.href = 'app.html')
      .catch(() => {
        alert('Invalid credentials. Please try again.', 'err');
        btn.disabled = false;
        btn.innerHTML = '<i class="bi bi-box-arrow-in-right"></i> Sign In';
      });
  }
  function alert(msg, t) {
    document.getElementById('lalert').innerHTML =
      `<div style="padding:10px 14px;border-radius:9px;margin-bottom:14px;font-size:.84rem;
        background:rgba(225,29,72,.12);border:1px solid rgba(225,29,72,.25);color:#fb7185">
        <i class="bi bi-exclamation-circle me-1"></i>${msg}</div>`;
  }
</script>
</body>
</html>
