<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Enterprise License Command Center</title>
    <style>
        :root { 
            --primary: #e94560; --bg: #0f3460; --dark: #1a1a2e; 
            --card: #16213e; --text: #ffffff; --success: #4eff8a; 
            --warning: #f1c40f; --danger: #ff4e4e; 
        }
        body { font-family: 'Inter', 'Segoe UI', sans-serif; background: var(--dark); color: var(--text); margin: 0; padding: 20px; }
        .container { max-width: 1200px; margin: 0 auto; }
        
        /* Stats Dashboard */
        .stats-bar { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 30px; }
        .stat-card { background: var(--card); padding: 20px; border-radius: 12px; border-left: 5px solid var(--primary); box-shadow: 0 4px 15px rgba(0,0,0,0.3); }
        .stat-card h4 { margin: 0; font-size: 0.8rem; text-transform: uppercase; color: #94a3b8; }
        .stat-card .value { font-size: 2rem; font-weight: bold; margin-top: 10px; }
        .border-blue { border-left-color: #4cc9f0; }
        .border-yellow { border-left-color: var(--warning); }
        .border-red { border-left-color: var(--danger); }

        /* Forms & Tables */
        .panel { background: var(--card); padding: 25px; border-radius: 12px; margin-bottom: 30px; border: 1px solid #1e293b; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 15px; }
        input, select { background: #0f172a; border: 1px solid #334155; color: white; padding: 12px; border-radius: 8px; width: 100%; box-sizing: border-box; }
        
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th { background: #1e293b; padding: 15px; text-align: left; color: #94a3b8; font-size: 0.8rem; }
        td { padding: 15px; border-bottom: 1px solid #1e293b; vertical-align: middle; }
        
        /* Badges */
        .badge { padding: 5px 12px; border-radius: 6px; font-size: 0.7rem; font-weight: bold; text-transform: uppercase; }
        .status-active { background: rgba(78, 255, 138, 0.1); color: var(--success); }
        .status-waiting { background: rgba(241, 196, 15, 0.1); color: var(--warning); }
        .status-expired { background: rgba(255, 78, 78, 0.1); color: var(--danger); }

        .btn { padding: 10px 18px; border: none; border-radius: 8px; cursor: pointer; font-weight: 600; transition: 0.2s; }
        .btn-main { background: var(--primary); color: white; width: 100%; margin-top: 15px; font-size: 1rem; }
        .btn-main:hover { opacity: 0.9; transform: translateY(-1px); }
        .btn-edit { background: #334155; color: white; font-size: 0.75rem; margin-right: 5px; }
        .btn-del { background: rgba(255, 78, 78, 0.1); color: var(--danger); font-size: 0.75rem; }
    </style>
</head>
<body>

<div class="container">
    <header style="margin-bottom: 30px;">
        <h1 style="margin:0; color: var(--primary);">License Management Console</h1>
        <p style="color: #94a3b8;">Monitor and control company access in real-time</p>
    </header>

    <div class="stats-bar">
        <div class="stat-card border-blue">
            <h4>Total Companies</h4>
            <div class="value" id="stat-total">0</div>
        </div>
        <div class="stat-card">
            <h4>Active Licenses</h4>
            <div class="value" id="stat-active" style="color: var(--success);">0</div>
        </div>
        <div class="stat-card border-yellow">
            <h4>Expiring Soon (< 7 days)</h4>
            <div class="value" id="stat-waiting" style="color: var(--warning);">0</div>
        </div>
        <div class="stat-card border-red">
            <h4>Expired / Disabled</h4>
            <div class="value" id="stat-expired" style="color: var(--danger);">0</div>
        </div>
    </div>

    <div class="panel">
        <h3 id="form-title" style="margin-top:0;">License Configuration</h3>
        <div class="grid">
            <input type="text" id="custName" placeholder="Company Name">
            <input type="text" id="licKey" placeholder="License Key (Unique)">
            <input type="text" id="custDomain" placeholder="Domain (e.g. site.com)">
            <input type="datetime-local" id="endDate">
            <select id="licStatus">
                <option value="active">Active</option>
                <option value="expired">Disabled</option>
            </select>
        </div>
        <button class="btn btn-main" onclick="saveLicense()">Deploy License Key</button>
    </div>

    <div class="panel">
        <h3 style="margin-top:0;">Global Company List</h3>
        <table>
            <thead>
                <tr>
                    <th>Company</th>
                    <th>Key Identifier</th>
                    <th>Domain</th>
                    <th>Time Remaining</th>
                    <th>Status</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody id="table-body"></tbody>
        </table>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, set, onValue, remove } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyAMnnp5WiV3HAlPSUX73GqG6zxwQRXSpuA",
        authDomain: "lickey-33267.firebaseapp.com",
        databaseURL: "https://lickey-33267-default-rtdb.firebaseio.com",
        projectId: "lickey-33267",
        storageBucket: "lickey-33267.firebasestorage.app",
        messagingSenderId: "283310739978",
        appId: "1:283310739978:web:bc2887db5e9ce5d9ec05f3",
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    window.saveLicense = function() {
        const key = document.getElementById('licKey').value.trim();
        const data = {
            user: document.getElementById('custName').value,
            domain: document.getElementById('custDomain').value,
            expiry: new Date(document.getElementById('endDate').value).getTime(),
            status: document.getElementById('licStatus').value
        };

        if (!key || !data.user || isNaN(data.expiry)) return alert("Fill all fields correctly!");
        set(ref(db, 'licenses/' + key), data).then(() => { resetForm(); });
    };

    onValue(ref(db, 'licenses'), (snapshot) => {
        const tableBody = document.getElementById('table-body');
        tableBody.innerHTML = "";
        const data = snapshot.val();
        
        let stats = { total: 0, active: 0, waiting: 0, expired: 0 };
        const now = Date.now();

        for (let key in data) {
            const lic = data[key];
            const timeLeft = lic.expiry - now;
            
            // LOGIC: Auto-check for expiry
            let displayStatus = lic.status;
            if (timeLeft <= 0) {
                displayStatus = "expired";
            }

            // Update Stats
            stats.total++;
            if (displayStatus === 'expired') stats.expired++;
            else if (timeLeft > 0 && timeLeft < (7 * 24 * 60 * 60 * 1000)) {
                stats.waiting++;
                displayStatus = "waiting"; // "Waiting period" (expiring soon)
            } else {
                stats.active++;
            }

            const row = `
                <tr>
                    <td><b>${lic.user}</b></td>
                    <td><code>${key}</code></td>
                    <td>${lic.domain || 'Global'}</td>
                    <td>${formatTimeLeft(timeLeft)}</td>
                    <td><span class="badge status-${displayStatus}">${displayStatus}</span></td>
                    <td>
                        <button class="btn btn-edit" onclick="editLic('${key}', '${lic.user}', '${lic.domain}', '${lic.expiry}', '${lic.status}')">Edit</button>
                        <button class="btn btn-del" onclick="deleteLic('${key}')">Remove</button>
                    </td>
                </tr>
            `;
            tableBody.innerHTML += row;
        }
        updateStats(stats);
    });

    function formatTimeLeft(ms) {
        if (ms <= 0) return "Expired";
        const days = Math.floor(ms / (24 * 60 * 60 * 1000));
        if (days > 0) return days + " Days Left";
        return "Expiring Today";
    }

    function updateStats(s) {
        document.getElementById('stat-total').innerText = s.total;
        document.getElementById('stat-active').innerText = s.active;
        document.getElementById('stat-waiting').innerText = s.waiting;
        document.getElementById('stat-expired').innerText = s.expired;
    }

    window.deleteLic = (key) => { if(confirm("Remove access?")) remove(ref(db, 'licenses/'+key)); };

    window.editLic = (key, user, domain, expiry, status) => {
        document.getElementById('licKey').value = key;
        document.getElementById('custName').value = user;
        document.getElementById('custDomain').value = domain === 'undefined' ? '' : domain;
        document.getElementById('licStatus').value = status;
        const date = new Date(parseInt(expiry));
        date.setMinutes(date.getMinutes() - date.getTimezoneOffset());
        document.getElementById('endDate').value = date.toISOString().slice(0, 16);
        document.getElementById('form-title').innerText = "Update License: " + key;
    };

    function resetForm() {
        document.getElementById('custName').value = "";
        document.getElementById('licKey').value = "";
        document.getElementById('custDomain').value = "";
        document.getElementById('form-title').innerText = "License Configuration";
    }
</script>
</body>
</html>
